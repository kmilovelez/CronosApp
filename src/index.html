<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#19191d">
    <meta name="description" content="Control de marcaciones y asistencia para equipos técnicos multisede. Colombia y México.">

    <!-- PWA: iOS / Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CronosApp">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.svg">

    <!-- PWA: Android / Chrome -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="CronosApp">

    <!-- Microsoft / Windows -->
    <meta name="msapplication-TileColor" content="#19191d">
    <meta name="msapplication-tap-highlight" content="no">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg">
    <link rel="icon" type="image/svg+xml" sizes="32x32" href="/icons/favicon.svg">

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" crossorigin="use-credentials">

    <title>CronosApp</title>

    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Splash screens iOS (previene pantalla blanca al abrir) -->
    <style>
        /* Splash / loading mientras carga el JS bundle */
        #app-loader {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #19191d;
            z-index: 9999;
            transition: opacity 0.3s ease;
        }
        #app-loader.hidden { opacity: 0; pointer-events: none; }
        #app-loader svg { width: 64px; height: 64px; animation: pulse 1.5s ease-in-out infinite; }
        #app-loader p { color: #8a8a9a; font-family: Inter, sans-serif; margin-top: 16px; font-size: 14px; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.08); opacity: 0.7; } }
    </style>

    <script>
        window.onerror = function(msg, src, line, col, err) {
            document.getElementById('app').innerHTML =
                '<div style="padding:32px;font-family:monospace;color:#f87171">' +
                '<h2>❌ Error al cargar CronosApp</h2>' +
                '<pre style="white-space:pre-wrap;background:#2a1f1f;padding:16px;border-radius:8px;color:#fca5a5">' +
                msg + '\n\nArchivo: ' + src + ':' + line + ':' + col +
                (err && err.stack ? '\n\n' + err.stack : '') +
                '</pre></div>';
        };
        window.addEventListener('unhandledrejection', function(e) {
            document.getElementById('app').innerHTML =
                '<div style="padding:32px;font-family:monospace;color:#f87171">' +
                '<h2>❌ Error (Promise) al cargar CronosApp</h2>' +
                '<pre style="white-space:pre-wrap;background:#2a1f1f;padding:16px;border-radius:8px;color:#fca5a5">' +
                (e.reason ? (e.reason.stack || e.reason.message || String(e.reason)) : 'Unknown') +
                '</pre></div>';
        });
    </script>
</head>
<body>
    <!-- Splash screen mientras carga -->
    <div id="app-loader">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
            <rect width="64" height="64" rx="12" fill="#19191d"/>
            <circle cx="32" cy="32" r="22" fill="none" stroke="#f02e65" stroke-width="2.5"/>
            <line x1="32" y1="32" x2="32" y2="21" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
            <line x1="32" y1="32" x2="40" y2="24" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
            <circle cx="32" cy="32" r="2" fill="#f02e65"/>
        </svg>
        <p>Cargando CronosApp…</p>
    </div>

    <div id="app"></div>

    <!-- Registro del Service Worker + Install prompt -->
    <script>
        // Registro del Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then((reg) => {
                        console.log('[CronosApp] SW registrado ✅', reg.scope);

                        // Auto-update: si hay nueva versión, activarla
                        reg.addEventListener('updatefound', () => {
                            const newWorker = reg.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'activated') {
                                    console.log('[CronosApp] Nueva versión disponible');
                                }
                            });
                        });
                    })
                    .catch((err) => console.warn('[CronosApp] SW error:', err));
            });
        }

        // Capturar el evento beforeinstallprompt para mostrar botón de instalación
        let deferredPrompt = null;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // Dispara evento custom para que React pueda mostrar el botón
            window.dispatchEvent(new CustomEvent('pwa-install-available'));
            console.log('[CronosApp] Install prompt capturado ✅');
        });

        // Función global para disparar la instalación desde React
        window.installPWA = async () => {
            if (!deferredPrompt) return false;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log('[CronosApp] Instalación:', outcome);
            deferredPrompt = null;
            return outcome === 'accepted';
        };

        // Detectar si ya está instalada como PWA
        window.isPWAInstalled = () => {
            return window.matchMedia('(display-mode: standalone)').matches
                || window.navigator.standalone === true;
        };

        // Ocultar splash cuando la app cargue
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('app-loader');
                if (loader) {
                    loader.classList.add('hidden');
                    setTimeout(() => loader.remove(), 300);
                }
            }, 500);
        });
    </script>
</body>
</html>
