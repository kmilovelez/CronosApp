  <line x1="16" y1="16" x2="20.2" y2="11.8" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="#f02e65"/>
  <!-- Hour marks -->
    <line x1="16.0" y1="5.3" x2="16.0" y2="7.2" stroke="#8a8a9a" stroke-width="1" stroke-linecap="round"/>
  <line x1="21.4" y1="6.7" x2="20.4" y2="8.4" stroke="#8a8a9a" stroke-width="1" stroke-linecap="round"/>
  <line x1="25.3" y1="10.6" x2="23.6" y2="11.6" stroke="#8a8a9a" stroke-width="1" stroke-linecap="round"/>
  <line x1="26.7" y1="16.0" x2="24.8" y2="16.0" stroke="#8a8a9a" stroke-width="1" stroke-linecap="round"/>
  <line x1="25.3" y1="21.4" x2="23.6" y2="20.4" stroke="#8a8a9a" stroke-width="1" stroke-linecap="round"/>
  <line x1="21.4" y1="25.3" x2="20.4" y2="23.6" stroke="#8a8a9a" stroke-width="1" stroke-linecap="round"/>
  <line x1="16.0" y1="26.7" x2="16.0" y2="24.8" stroke="#8a8a9a" stroke-width="1" stroke-linecap="round"/>
  <line x1="10.6" y1="25.3" x2="11.6" y2="23.6" stroke="#8a8a9a" stroke-width="1" stroke-linecap="round"/>
  <line x1="6.7" y1="21.4" x2="8.4" y2="20.4" stroke="#8a8a9a" stroke-width="1" stroke-linecap="round"/>
  <line x1="5.3" y1="16.0" x2="7.2" y2="16.0" stroke="#8a8a9a" stroke-width="1" stroke-linecap="round"/>
  <line x1="6.7" y1="10.6" x2="8.4" y2="11.6" stroke="#8a8a9a" stroke-width="1" stroke-linecap="round"/>
  <line x1="10.6" y1="6.7" x2="11.6" y2="8.4" stroke="#8a8a9a" stroke-width="1" stroke-linecap="round"/>
  <!-- "C" letter -->
  <text x="16" y="30.4" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="4" fill="#f02e65" opacity="0.9">C</text>
</svg>